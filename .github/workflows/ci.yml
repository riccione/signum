      - '**.md'
      - 'LICENSE*'
      - '.gitignore'

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    uses: riccione/github-workflows/.github/workflows/rust-ci.yml@24ba5409c1eeac121965cedc2fb507b0387f25af
